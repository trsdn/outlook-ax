name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    if: ${{ !github.event.repository.private || vars.ENABLE_PRIVATE_SECRET_SCAN == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        shell: bash
        run: |
          set -euo pipefail

          key_re='READWISE_TOKEN|GITHUB_TOKEN|GH_TOKEN|OPENAI_API_KEY|ANTHROPIC_API_KEY|AZURE_OPENAI_API_KEY|VOYAGE_API_KEY|TODOIST_TOKEN|API[_-]?KEY|ACCESS[_-]?TOKEN|CLIENT[_-]?SECRET|SECRET|PASSWORD'
          value_re='[A-Za-z0-9_./+=-]{16,}'
          literal_re='Bearer[[:space:]]+[A-Za-z0-9._~+/=-]{20,}|Token[[:space:]]+[A-Za-z0-9._~+/=-]{20,}|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,}|-----BEGIN (RSA |OPENSSH |DSA |EC )?PRIVATE KEY-----'
          secret_re="(\"?(${key_re})\"?[[:space:]]*[:=][[:space:]]*\"?${value_re}|${literal_re})"

          status=0
          tracked_matches="$(git grep -l -I -E "$secret_re" HEAD -- . ':(exclude).github/workflows/secret-scan.yml' 2>/dev/null || true)"
          if [[ -n "$tracked_matches" ]]; then
            while IFS= read -r file; do
              [[ -n "$file" ]] && echo "::error file=${file}::Potential committed secret pattern detected."
            done <<< "$tracked_matches"
            status=1
          fi

          event_name="${{ github.event_name }}"
          before_sha="${{ github.event.before }}"
          head_sha="${{ github.sha }}"
          base_ref="${{ github.base_ref }}"

          if [[ "$event_name" == "pull_request" && -n "$base_ref" ]]; then
            git fetch --no-tags origin "$base_ref" --depth=1
            base_sha="$(git merge-base HEAD "origin/${base_ref}")"
            range="${base_sha}..HEAD"
          elif [[ -n "$before_sha" && ! "$before_sha" =~ ^0+$ ]]; then
            range="${before_sha}..${head_sha}"
          elif git rev-parse "${head_sha}^" >/dev/null 2>&1; then
            range="${head_sha}^..${head_sha}"
          else
            range="$head_sha"
          fi

          history_hits=""
          for commit in $(git rev-list "$range"); do
            commit_matches="$(git grep -l -I -E "$secret_re" "$commit" -- . ':(exclude).github/workflows/secret-scan.yml' 2>/dev/null || true)"
            if [[ -n "$commit_matches" ]]; then
              while IFS= read -r file; do
                [[ -n "$file" ]] && history_hits+="${commit}:${file}"$'\n'
              done <<< "$commit_matches"
            fi
          done

          if [[ -n "$history_hits" ]]; then
            while IFS=: read -r commit file; do
              [[ -n "$commit" && -n "$file" ]] && echo "::error file=${file}::Potential secret pattern present in pushed commit ${commit}."
            done <<< "$history_hits"
            status=1
          fi

          exit "$status"
